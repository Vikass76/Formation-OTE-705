<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merci - Esprit Trading</title>
    <link rel="stylesheet" href="checkout.css" />
    <style>
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; }
      .merci-box { max-width: 480px; text-align: center; padding: 48px 32px; background: #fff; border: 1px solid #e3e3e3; border-radius: 14px; box-shadow: 0 2px 24px rgba(0,0,0,0.06); }
      .merci-box .check { width: 64px; height: 64px; border-radius: 50%; background: #ffd700; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
      .merci-box h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
      .merci-box p { color: #595959; margin-bottom: 24px; line-height: 1.6; }
      .merci-box a { display: inline-block; background: #ffd700; color: #1a1505; padding: 14px 28px; border-radius: 10px; text-decoration: none; font-weight: 800; }
    </style>
  </head>
  <body>
    <div class="merci-box">
      <div class="check">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#1a1505" stroke-width="2.5">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Paiement confirmé !</h1>
      <p>Merci pour ta confiance. Tu vas recevoir un email avec tous les détails pour accéder à ta formation OTE 705.</p>
      <a href="https://app.esprittrading.fr">Accéder à la plateforme</a>
    </div>
  </body>
</html>
